# Render Blueprint Specification for AYUSHMAN-AI (आयुष्मान-AI)
# Deploy both services in one click!

services:
  # 1. FastAPI Machine Learning Forecasting Microservice
  - type: web
    name: ayushman-ai-ml
    env: python
    rootDir: ml_service
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"

  # 2. React/Express Full-Stack Web App (Dashboard & APIs)
  - type: web
    name: ayushman-ai-web
    env: node
    plan: free
    region: oregon
    buildCommand: npm install && npm run build
    startCommand: node dist/server.cjs
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3000"
      - key: GEMINI_API_KEY
        sync: false # You will be prompted to paste your Gemini API key securely in the Render dashboard.
      - key: ML_SERVICE_URL
        fromService:
          type: web
          name: ayushman-ai-ml
          property: host
